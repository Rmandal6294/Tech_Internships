<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
    <title> Age Calculator </title>
    <link rel="stylesheet" href="styles_R.css">
</head>
<body>
    <header>
        <h2>Codec — 01</h2>
        <h1> Project -<span>Age Calculator</span></h1>
        <p>Determine the exact duration of your existence.</p>
    </header>

    <main>
        <div class="InstractionLabel">
            <span class="labelSection">Date of Birth</span>
            <span class="labelInfo">day / month / year</span>
        </div>

        <div class="birthdayInput">
            <div class="Input_field">
                <label for="dayInput">Day</label><br>
                <input id="dayInput" type="number"  placeholder="DD" min="1" max="31" maxlength="2" title="Input your Birth Year"/>
            </div>

            <div class="Input_field">
                <label for="monthInput">Month</label><br>
                <select id="monthInput" title="Input your Birth Year">
                    <option value="">MM</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <div class="Input_field">
                <label for="yearInput">Year</label><br>
                <input id="yearInput" type="number" placeholder="YYYY" maxlength="4" min="1900" title="Input your Birth Year"/>
            </div>
        </div>

        <div class="errorMessage" id="errorMessage">
            <span class="material-symbols-outlined">warning</span>
            <span id="errorText"> </span>
        </div>

        <div class = "todayField">
            <div class = "LineDesign">
                <div class="leftLine"></div>
                <span class="TodayText">Today</span>
                <div class="rightLine"></div>
            </div>

            <div class = "dateTodayField">
                <span class="material-symbols-outlined">hdr_strong</span>
                <span id="todayDate"></span>
            </div>
        </div>

        <button class="cal_btn" onclick="calculate()">Calculate My Age</button>

        <div class="resultSection" id="resultSection">
            <p class="resultLabel">You are exactly</p>
            <div class="resultContainer">
                <div class="resultBox">
                    <span class="setNum" id="R_years">0</span><br>
                    <span class="Setunit">Years</span>
                </div>

                <div class="resultBox">
                    <span class="setNum" id="R_months">0</span><br>
                    <span class="Setunit">Months</span>
                </div>

                <div class="resultBox">
                    <span class="setNum" id="R_days">0</span><br>
                    <span class="Setunit">Days</span>
                </div>
            </div>

            <div class="resultText" id="resultText"></div>
            <div class="nextBirthday" id="nextBirthday"></div>
        </div>
    </main>

    <footer>
        <p class="footer">© 2026 Codec — Age Calculator Project</p>
    </footer>

    <script src="scripts_R.js"></script>
</body>
</html>
